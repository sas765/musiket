<!DOCTYPE html>
<html>

<head>
  <title>Log in</title>
  <link rel="stylesheet" href="/static/main.css">
</head>

<body>
  <div class="header">
    <h1>Log in</h1>
  </div>
  <div class="nav">
    <p>
      <a href="/">Front page</a>
    </p>
  </div>
  <div class="content">
    {% if get_flashed_messages() %}
    <div class="flash">
      {% for message in get_flashed_messages() %}
      <p>
        <b>{{ message }}</b>
      </p>
      {% endfor %}
    </div>
    {% endif %}
    {% if session.username %}
    <p>
      Already logged in as {{ session.username }}
    </p>
    <p>
      <a href="/logout">Log out</a>
    </p>
    {% else %}
    <form action="/login" method="post">
      <p>
        Username: <br />
        <input type="text" name="username" required maxlength="16" />
      </p>
      <p>
        Password: <br />
        <input type="password" name="password" required />
      </p>
      <input type="submit" value="Kirjaudu" />
    </form>
    {% endif %}
  </div>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <title>Find entry</title>
  <link rel="stylesheet" href="/static/main.css">
</head>

<body>
  <div class="header">
    <h1>Find entry</h1>
  </div>
  <div class="nav">
    <form action="/find_entry" method="get">
      <p>
        Keyword: <input type="text" name="query">
      </p>
      <input type="submit" value="Search">
    </form>

    <p>
      <a href="/">Back</a>
    </p>
  </div>
  {% if query %}
  <div class="content">
    <h2>Results</h2>


    {% for entry in results %}
    <div class="entry">
      <a href="/entry/{{ entry.id }}">
      {{ entry.title }} by {{ entry.artist }}
      </a>
      in <a href="/user/{{ entry.user_id }}">{{ entry.username }}</a>'s collection
    </div>
    {% endfor %}
  </div>
  {% endif %}
</body>

</html>

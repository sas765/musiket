<!DOCTYPE html>
<html>

<head>
  <title>Add music to your collection</title>
  <link rel="stylesheet" href="/static/main.css">
</head>

<body>
  <div class="header">
    <h1>Add music to your collection</h1>
  </div>
  <div class="nav">
    <p>
      <a href="/">Front page</a>
    </p>
  </div>
  <div class="content">
    {% if get_flashed_messages() %}
    <div class="flash">
      {% for message in get_flashed_messages() %}
      <p>
        <b>{{ message }}</b>
      </p>
      {% endfor %}
    </div>
    {% endif %}
    <form action="/create_entry" method="post">
      <p>
        <label for="title">Title</label>:<br />
        <input id="title" type="text" name="title" size="50" maxlength="100" required/>
      </p>
      <p>
        <label for="artist">Artist</label>:<br />
        <input id="artist" type="text" name="artist" maxlength="75" required/>
      </p>
      {% for class in classes %}
      <p>
        <label for="{{ class }}">{{ class }}</label>:<br />
        <select id="{{ class }}" name="classes">
          <option value="">(Choose)</option>
        {% for option in classes[class] %}
          <option value="{{ class }}:{{ option }}">{{ option }}</option>
        {% endfor %}
        </select>
      </p>
      {% endfor %}
      <p>
        <label for="comment">Comment</label>:<br />
        <textarea id="comment" name="comment" rows="8" cols="60" maxlength="2500"></textarea>
      </p>
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
      <input type="submit" value="Add to collection" />
    </form>
  </div>
</body>

</html>

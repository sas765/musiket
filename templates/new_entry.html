<!DOCTYPE html>
<html>

<head>
  <title>Add music to your collection</title>
  <link rel="stylesheet" href="/static/main.css">
</head>

<body>
  <div class="header">
    <h1>Add music to your collection</h1>
  </div>
  <div class="nav">
    <p>
      <a href="/">Front page</a>
    </p>
  </div>
  <div class="content">
    <form action="/create_entry" method="post">
      <p>
        Title: <br />
        <input type="text" name="title" size="50" maxlength="100" required/>
      </p>
      <p>
        Artist: <br />
        <input type="text" name="artist" maxlength="75" required/>
      </p>
      <p>
        Comment: <br />
        <textarea name="comment" rows="8" cols="60" maxlength="2500"></textarea>
      </p>
      <input type="submit" value="Add to collection" />
    </form>
  </div>
</body>

</html>
